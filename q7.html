<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration Form</title>
</head>
<body>

    <h1 style="color:red; ">Employee Registration Form</h1>

    <form >

        <!-- Title -->
        <label></label>
        <input type="radio" name="title"> Mr.
        <input type="radio" name="title"> Mrs.
        <input type="radio" name="title"> Ms.
        <br><br>

        <!-- First Name -->
        <label>First Name:</label>
        <input type="text" placeholder="First Name">
        <br><br>

        <!-- Last Name -->
        <label>Last Name:</label>
        <input type="text" placeholder="Last Name">
        <br><br>

        <!-- Address -->
        <label>Mail Address1:</label>
        <input type="text">
        <br><br>

        <label>Mail Address2:</label>
        <input type="text">
        <br><br>

        <!-- City -->
        <label>City:</label>
        <input type="text">
        <br><br>

        <!-- State Dropdown -->
        <label>State:</label>
        <select>
            <option>Gujarat</option>
            <option>Madhya Pradesh</option>
            <option>Maharashtra</option>
            <option>Rajasthan</option>
        </select>
        <br><br>

        <!-- Zip -->
        <label>Zip:</label>
        <input type="text">
        <br><br>

        <!-- Upload Photo -->
        <label>Upload Photo:</label>
        <input type="file">
        <br><br>

        <!-- Email -->
        <label>E-Mail:</label>
        <input type="email">
        <br><br>

        <!-- Mobile -->
        <label>Mobile:</label>
        <input type="text" value="+91">
        <br><br>

        <!-- Languages Known -->
        <label>Languages known:</label><br>
        <input type="checkbox"> Gujarati <br>
        <input type="checkbox"> Hindi <br>
        <input type="checkbox"> English <br>
        <input type="checkbox"> Marathi <br><br>

        <!-- Additional Info -->
        <label>Additional Information:</label><br>
        <textarea rows="4" cols="40" placeholder="Optional"></textarea>
        <br><br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
